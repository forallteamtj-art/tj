<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Math Solver 📘</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #4facfe, #00f2fe);
}

.container {
    max-width: 900px;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-top: 15px;
}

button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: #4facfe;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #007bff;
}

.output {
    margin-top: 25px;
    padding: 20px;
    border-radius: 10px;
    background: #f9f9f9;
    border: 1px dashed #ccc;
    white-space: pre-wrap;
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">
    <h1>Math Problem Solver 📘</h1>

    <input id="question" placeholder="Example: 2x + 3 = 11">

    <button onclick="solve()">Solve Step by Step</button>

    <div id="output" class="output"></div>
</div>

<script>
function solve() {
    let q = document.getElementById("question").value.trim();
    let output = document.getElementById("output");

    if (!q) {
        output.innerText = "Please enter a question.";
        return;
    }

    try {
        // SIMPLE LINEAR EQUATION SOLVER (ax + b = c)
        let match = q.match(/(-?\d*)x\s*([\+\-]\s*\d+)?\s*=\s*(-?\d+)/);

        if (match) {
            let a = match[1];
            let b = match[2];
            let c = parseFloat(match[3]);

            if (a === "" || a === "+") a = 1;
            else if (a === "-") a = -1;
            else a = parseFloat(a);

            if (b) b = parseFloat(b.replace(/\s/g, ""));
            else b = 0;

            let step1 = `Given: ${a}x + (${b}) = ${c}`;
            let step2 = `Step 1: Move constant to right side`;
            let step3 = `${a}x = ${c} - (${b})`;
            let step4 = `${a}x = ${c - b}`;
            let step5 = `Step 2: Divide both sides by ${a}`;
            let x = (c - b) / a;
            let step6 = `x = ${x}`;

            output.innerText = `${step1}

${step2}
${step3}
${step4}

${step5}
${step6}`;
        } else {
            // BASIC CALCULATOR
            let result = eval(q);
            output.innerText = `Answer: ${result}`;
        }

    } catch (e) {
        output.innerText = "Invalid input. Try again.";
    }
}
</script>

</body>
</html>
